<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#7C3447">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sozial Walk">
<title>Sozial Walk · Stempelkarten</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./apple-touch-icon.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
/* ===================== Design-Tokens (an Logo angelehnt) ===================== */
:root{
  --berry:#7C3447; --berry-d:#5E2536; --berry-2:#98455B; --berry-l:#F3E7EB;
  --amber:#E0913E; --amber-d:#C9762A; --coral:#E2705A;
  --ink:#291A1F; --gray:#8A767C; --bg:#F6F1EF; --card:#FFFFFF;
  --line:#ECE1E1; --good:#34C759; --danger:#D8483F;
  --sh:0 8px 24px rgba(60,20,33,.12); --sh-sm:0 2px 8px rgba(60,20,33,.07);
  --r:20px; --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.45;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
button{font-family:inherit; cursor:pointer; border:0; background:none; color:inherit}
input{font-family:inherit}
.app{max-width:540px; margin:0 auto; min-height:100vh; min-height:100dvh; position:relative}

/* ----- Kopf ----- */
.top{
  position:sticky; top:0; z-index:30;
  padding:calc(var(--safe-t) + 14px) 18px 16px;
  background:linear-gradient(180deg,var(--berry-2) 0%, var(--berry) 60%, var(--berry-d) 100%);
  color:#fff; border-bottom-left-radius:24px; border-bottom-right-radius:24px; box-shadow:var(--sh);
}
.brand{display:flex; align-items:center; gap:12px}
.logo{width:48px; height:48px; border-radius:50%; flex:0 0 auto; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.18); object-fit:cover}
.brand h1{margin:0; font-size:20px; font-weight:800; letter-spacing:-.2px}
.brand .sub{margin:1px 0 0; font-size:12.5px; opacity:.85; font-weight:500}
.gear{width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.16); display:grid; place-items:center; font-size:19px}
.gear:active{transform:scale(.92)}
.top-actions{margin-left:auto; display:flex; gap:8px}

.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:16px}
.stat{background:rgba(255,255,255,.13); border-radius:15px; padding:11px 8px; text-align:center}
.stat .n{font-size:23px; font-weight:800; line-height:1.1}
.stat .l{font-size:10.5px; opacity:.85; margin-top:2px; font-weight:600}
.stat.hl{background:rgba(224,145,62,.30); box-shadow:inset 0 0 0 1px rgba(224,145,62,.55)}

/* ----- Suche ----- */
.searchwrap{padding:16px 18px 4px}
.search{display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:11px 14px; box-shadow:var(--sh-sm)}
.search input{border:0; outline:0; font-size:16px; width:100%; background:none; color:var(--ink)}
.search .ic{font-size:16px; opacity:.5}

/* ----- Liste ----- */
.list{padding:8px 18px 128px}
.crow{display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:13px 13px 13px 14px; margin-top:11px; box-shadow:var(--sh-sm)}
.cmain{display:flex; align-items:center; gap:13px; flex:1; min-width:0}
.cmain:active{opacity:.6}
.av{width:46px; height:46px; border-radius:14px; flex:0 0 auto; display:grid; place-items:center; font-weight:800; font-size:18px; color:#fff; background:linear-gradient(135deg,var(--berry-2),var(--berry))}
.cinfo{min-width:0; flex:1}
.cinfo .nm{font-weight:700; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.cinfo .dg{font-size:13px; color:var(--gray); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mini{display:flex; gap:5px; margin-top:7px}
.mini i{width:15px; height:15px; border-radius:50%; background:var(--berry-l); box-shadow:inset 0 0 0 1.5px rgba(124,52,71,.22); font-style:normal; display:grid; place-items:center; font-size:9px}
.mini i.f{background:var(--berry); box-shadow:none; color:#fff}
/* Schnell-Stempel-Knopf */
.qstamp{width:54px; height:54px; border-radius:16px; flex:0 0 auto; display:grid; place-items:center; color:#fff; font-size:25px; background:linear-gradient(135deg,var(--amber),var(--amber-d)); box-shadow:0 6px 14px rgba(201,118,42,.36)}
.qstamp:active{transform:scale(.9)}
.qstamp.done{background:var(--berry); box-shadow:none; font-size:13px; font-weight:800; flex-direction:column; line-height:1}
.qstamp.done small{font-size:8.5px; opacity:.85; font-weight:600}

.empty{text-align:center; padding:54px 30px; color:var(--gray)}
.empty .em{font-size:54px}
.empty h3{margin:14px 0 4px; color:var(--ink); font-size:18px}
.empty p{margin:0; font-size:14px}

.fab{position:fixed; left:50%; transform:translateX(calc(-50% + 540px/2 - 50px)); bottom:calc(var(--safe-b) + 20px); z-index:40; height:56px; padding:0 22px 0 18px; border-radius:30px; color:#fff; font-weight:800; font-size:16px; background:linear-gradient(135deg,var(--berry-2),var(--berry)); box-shadow:0 10px 26px rgba(124,52,71,.42); display:flex; align-items:center; gap:9px}
.fab:active{transform:translateX(calc(-50% + 540px/2 - 50px)) scale(.95)}
.fab .pl{font-size:24px; font-weight:400; line-height:1}
@media(max-width:560px){ .fab{left:auto; right:20px; transform:none} .fab:active{transform:scale(.95)} }

/* ===================== Overlay / Sheets ===================== */
.ovl{position:fixed; inset:0; z-index:60; background:rgba(40,18,26,.44); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .22s ease}
.ovl.show{opacity:1; pointer-events:auto}
.sheet{width:100%; max-width:540px; background:var(--bg); border-radius:26px 26px 0 0; padding:10px 20px calc(var(--safe-b) + 24px); max-height:92vh; overflow-y:auto; transform:translateY(24px); transition:transform .26s cubic-bezier(.22,1,.36,1); -webkit-overflow-scrolling:touch}
.ovl.show .sheet{transform:translateY(0)}
.grab{width:40px; height:5px; border-radius:3px; background:#dcd2d2; margin:6px auto 14px}
.sheet h2{margin:2px 0 4px; font-size:21px; letter-spacing:-.3px}
.sheet .p{color:var(--gray); font-size:14.5px; margin:0 0 16px}
.lbl{font-size:12.5px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.4px; margin:14px 2px 7px}

.field{width:100%; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px; font-size:16px; color:var(--ink); outline:0; margin-bottom:2px}
.field:focus{border-color:var(--berry-2); box-shadow:0 0 0 3px rgba(152,69,91,.16)}

.btn{width:100%; padding:15px; border-radius:15px; font-size:16px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--berry-2),var(--berry)); margin-top:12px; box-shadow:var(--sh-sm)}
.btn:active{transform:scale(.98)}
.btn.amber{background:linear-gradient(135deg,var(--amber),var(--amber-d)); box-shadow:0 8px 20px rgba(201,118,42,.32)}
.btn.gray{background:#ECE2E0; color:var(--ink); box-shadow:none}
.btn.danger{background:#fff; color:var(--danger); box-shadow:inset 0 0 0 1.5px rgba(216,72,63,.4)}
.btn.ghost{background:none; color:var(--gray); box-shadow:none; font-weight:600}

.rows{background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--sh-sm)}
.row{display:flex; align-items:center; gap:12px; padding:14px 15px; border-top:1px solid var(--line)}
.row:first-child{border-top:0}
.row .ri{font-size:18px; width:24px; text-align:center}
.row .rt{flex:1; font-weight:600; font-size:15.5px}
.row .rv{color:var(--gray); font-size:14px; font-weight:600}
.row.tap:active{background:var(--berry-l)}
.row.danger .rt{color:var(--danger)}
.chev{color:#cfc1c4; font-size:22px; font-weight:700}

.chlist{margin:6px 0 4px; padding-left:20px}
.chlist li{margin:5px 0; font-size:14.5px}
.vitem{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:13px 15px; margin-top:10px; box-shadow:var(--sh-sm)}
.vitem .vh{display:flex; align-items:baseline; gap:9px; margin-bottom:5px}
.vitem .vv{font-weight:800; font-size:15px; color:var(--berry)}
.vitem .vd{font-size:12.5px; color:var(--gray)}
.vitem ul{margin:4px 0 0; padding-left:18px}
.vitem li{font-size:13.5px; margin:3px 0}
.tagnew{font-size:10px; font-weight:800; color:#fff; background:var(--amber); padding:2px 7px; border-radius:999px}

/* ===================== Stempelkarte ===================== */
.cust-head{display:flex; align-items:center; gap:13px; margin-bottom:14px}
.cust-head .av{width:50px; height:50px; font-size:20px}
.cust-head .nm{font-weight:800; font-size:19px}
.cust-head .dg{font-size:13.5px; color:var(--gray)}
.cust-head .ed{margin-left:auto; width:40px; height:40px; border-radius:50%; background:var(--berry-l); display:grid; place-items:center; font-size:17px}

.stampcard{position:relative; border-radius:22px; padding:18px 18px 20px; color:#fff; overflow:hidden; background:linear-gradient(140deg,var(--berry-2) 0%, var(--berry) 55%, var(--berry-d) 100%); box-shadow:0 14px 34px rgba(60,20,33,.34)}
.stampcard::after{content:""; position:absolute; right:-30px; top:-30px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,.07)}
.sc-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:2}
.sc-ttl{font-size:13px; font-weight:800; letter-spacing:1.5px; opacity:.92}
.sc-sub{font-size:11.5px; opacity:.78; margin-top:1px}
.sc-cnt{font-size:13px; font-weight:800; background:rgba(255,255,255,.18); padding:4px 11px; border-radius:999px}
.slots{display:grid; grid-template-columns:repeat(5,1fr); gap:9px; margin:20px 0 8px; position:relative; z-index:2}
.slot{aspect-ratio:1/1; border-radius:50%; background:rgba(255,255,255,.12); box-shadow:inset 0 0 0 2px rgba(255,255,255,.32); display:grid; place-items:center; position:relative}
.slot.next{box-shadow:inset 0 0 0 2px #fff; cursor:pointer; animation:nextpulse 1.8s ease-in-out infinite}
@keyframes nextpulse{0%,100%{box-shadow:inset 0 0 0 2px rgba(255,255,255,.7)}50%{box-shadow:inset 0 0 0 3px #fff}}
.slot .num{font-size:15px; font-weight:800; opacity:.5}
.slot.on{background:#fff; box-shadow:0 4px 10px rgba(0,0,0,.18)}
.slot .paw{font-size:23px; line-height:1}
.slot .dt{position:absolute; bottom:-15px; left:0; right:0; text-align:center; font-size:8.5px; opacity:.82; font-weight:600}
.slot.pop .paw{animation:stampdrop .5s cubic-bezier(.18,1.4,.4,1) both}
.slot.pop::before{content:""; position:absolute; inset:-2px; border-radius:50%; box-shadow:0 0 0 0 rgba(224,145,62,.55); animation:inkring .6s ease-out both}
@keyframes stampdrop{0%{transform:scale(2.5) rotate(-28deg); opacity:0}45%{opacity:1}65%{transform:scale(.86) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
@keyframes inkring{0%{box-shadow:0 0 0 0 rgba(224,145,62,.6)}100%{box-shadow:0 0 0 16px rgba(224,145,62,0)}}
.sc-foot{display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; margin-top:18px}
.sc-name{font-size:14px; font-weight:700; letter-spacing:.3px}
.sc-name small{display:block; font-size:10px; opacity:.72; font-weight:600; letter-spacing:1px; text-transform:uppercase}
.stampcard.full{animation:cardglow 1.2s ease-out}
@keyframes cardglow{0%{box-shadow:0 0 0 0 rgba(224,145,62,.7),0 14px 34px rgba(60,20,33,.34)}100%{box-shadow:0 0 0 14px rgba(224,145,62,0),0 14px 34px rgba(60,20,33,.34)}}
.fullnote{background:rgba(224,145,62,.16); border:1px solid rgba(224,145,62,.42); color:#8a5a14; border-radius:13px; padding:12px 14px; margin-top:14px; font-size:14px; font-weight:600; line-height:1.4}

.hist{margin-top:6px}
.hist .hi{display:flex; align-items:center; gap:10px; padding:10px 2px; border-top:1px solid var(--line); font-size:14px}
.hist .hi:first-child{border-top:0}
.hist .hi .g{font-size:16px}
.hist .hi .d{color:var(--gray); margin-left:auto; font-size:13px}

.toast{position:fixed; left:50%; bottom:calc(var(--safe-b) + 92px); transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px; font-size:14px; font-weight:600; z-index:80; opacity:0; pointer-events:none; transition:all .25s ease; box-shadow:var(--sh); white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
#cfx{position:fixed; inset:0; z-index:70; pointer-events:none}
.center{text-align:center}
.big-emoji{font-size:46px; text-align:center; margin:6px 0}

/* ===================== Dashboard & Archiv ===================== */
.dash-stats{display:grid; grid-template-columns:repeat(2,1fr); gap:9px}
.dcard{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:13px 14px; box-shadow:var(--sh-sm)}
.dcard .n{font-size:24px; font-weight:800; color:var(--berry); line-height:1.1}
.dcard .l{font-size:12px; color:var(--gray); font-weight:600; margin-top:2px}
.bars{display:flex; align-items:flex-end; gap:8px; height:124px; padding:18px 2px 0}
.bars .bar{flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; height:100%; justify-content:flex-end}
.bars .bk{width:100%; max-width:34px; border-radius:7px 7px 3px 3px; background:linear-gradient(180deg,var(--berry-2),var(--berry)); min-height:3px; position:relative; transition:height .4s cubic-bezier(.22,1,.36,1)}
.bars .bv{position:absolute; top:-17px; left:-6px; right:-6px; text-align:center; font-size:11px; font-weight:800; color:var(--berry)}
.bars .bl{font-size:10.5px; color:var(--gray); font-weight:600}
.arch{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:12px 14px; margin-top:10px; box-shadow:var(--sh-sm)}
.arch .ah{display:flex; align-items:center; gap:7px}
.arch .ah .nm{font-weight:700; font-size:15px}
.arch .ah .d{margin-left:auto; font-size:12.5px; color:var(--gray)}
.arch .pawline{margin:8px 0 11px; font-size:15px; letter-spacing:3px}
.arch .actions{display:flex; gap:8px}
.arch .actions button{flex:1; padding:10px; border-radius:11px; font-weight:700; font-size:13.5px}
.abtn-re{background:var(--berry-l); color:var(--berry)}
.abtn-del{background:#fbecea; color:var(--danger)}
.warn{font-size:13.5px; color:var(--gray); text-align:center; padding:20px}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <img class="logo" src="./logo.png" alt="Logo Hundetraining Susi Zednik">
      <div>
        <h1>Sozial Walk</h1>
        <div class="sub">Stempelkarten · Susi Zednik</div>
      </div>
      <div class="top-actions">
        <button class="gear" onclick="openDashboard()" aria-label="Übersicht">📊</button>
        <button class="gear" onclick="openSettings()" aria-label="Einstellungen">⚙️</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="searchwrap">
    <div class="search"><span class="ic">🔍</span>
      <input id="q" type="search" placeholder="Halter oder Hund suchen …" oninput="renderList()" autocomplete="off">
    </div>
  </div>

  <main class="list" id="list"></main>
</div>

<button class="fab" onclick="editCustomer(null)"><span class="pl">＋</span> Neuer Kunde</button>

<div class="ovl" id="ovl"></div>
<div class="toast" id="toast"></div>
<canvas id="cfx"></canvas>

<script>
'use strict';
/* ================= Version & Verlauf ================= */
const APP_VERSION = 'v4';
const VERSIONS = [
  { v:'v4', date:'22. Juni 2026', notes:[
    'App-Icon: Hunde-Silhouette jetzt groß und klar sichtbar (weiß auf Beerenrot)',
    'Hinweis: Falls das Icon am Home-Bildschirm noch alt aussieht, App einmal entfernen und neu „Zum Home-Bildschirm" hinzufügen'
  ]},
  { v:'v3', date:'22. Juni 2026', notes:[
    'Echtes Markenlogo mit Hunde-Silhouette als App-Icon (klar sichtbar)',
    'Neues Dashboard (📊): Sozial Walks pro Monat als Balken, „länger nicht da"-Hinweis',
    'Archiv für volle Karten: einzeln reaktivieren oder löschen',
    'Optionsfenster lässt sich jetzt per Wisch nach unten schließen'
  ]},
  { v:'v2', date:'22. Juni 2026', notes:[
    'Echtes rundes Logo der Hundeschule als App-Icon, Farbwelt ans Logo angepasst',
    'Supereinfach: Halter antippen → Stempel → fertig',
    'Schnell-Stempel direkt aus der Liste (🐾-Knopf)',
    'Nur noch Halter- und Hundename – sonst nichts',
    'Karte hat 5 vergünstigte Sozial Walks; bei voller Karte erneuern oder Einzelbuchung (kein Gratis-Bonus)',
    'Datum jedes Stempels wird gespeichert – jederzeit nachvollziehbar'
  ]},
  { v:'v1', date:'22. Juni 2026', notes:[
    'Erste Version der Sozial-Walk-Stempelkarte mit 5 Einheiten',
    'Kundenliste, Stempelkarte und Konfetti-Animation'
  ]}
];
const CHANGES = VERSIONS[0].notes;

/* ================= Daten ================= */
const DB = 'sozial-walk';
function ld(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function sv(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function defState(){ return { v:2, pup:false, customers:[] }; }
let S = Object.assign(defState(), ld(DB,{}));
// sanfte Migration alter Felder
S.customers = (S.customers||[]).map(c=>({ id:c.id, name:c.name, dog:c.dog||'', stamps:c.stamps||[], done:c.done||c.redeemed||[] }));
function save(){ sv(DB,S); }

/* ================= Helfer ================= */
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function uid(){ return 'c'+Date.now().toString(36)+Math.floor(performance.now()*9%1000).toString(36); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(iso){ if(!iso) return '–'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'}); }
function fmtShort(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
function initials(n){ const p=(n||'').trim().split(/\s+/); return ((p[0]||'')[0]||'?').toUpperCase()+((p[1]||'')[0]||'').toUpperCase(); }
function cust(id){ return S.customers.find(c=>c.id===id); }

/* ================= Statistik (leichtes Dashboard) ================= */
function renderStats(){
  const ym = todayISO().slice(0,7);
  const kunden = S.customers.length;
  const voll = S.customers.filter(c=>(c.stamps||[]).length>=5).length;
  let monat = 0;
  S.customers.forEach(c=>{
    (c.stamps||[]).forEach(d=>{ if(d.slice(0,7)===ym) monat++; });
    (c.done||[]).forEach(r=>(r.stamps||[]).forEach(d=>{ if(d.slice(0,7)===ym) monat++; }));
  });
  $('#stats').innerHTML = stat(kunden,'Kund:innen') + stat(monat,'Walks/Monat') + stat(voll,'Karten voll', voll>0);
}
function stat(n,l,hl){ return '<div class="stat'+(hl?' hl':'')+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }

/* ================= Liste ================= */
function renderList(){
  renderStats();
  const q = ($('#q')?.value||'').trim().toLowerCase();
  let list = S.customers.slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
  if(q) list = list.filter(c=>(c.name+' '+(c.dog||'')).toLowerCase().includes(q));
  const el = $('#list');
  if(!S.customers.length){ el.innerHTML='<div class="empty"><div class="em">🐶</div><h3>Noch keine Kunden</h3><p>Lege deinen ersten Kunden an und gib den ersten Stempel.</p></div>'; return; }
  if(!list.length){ el.innerHTML='<div class="empty"><div class="em">🔍</div><h3>Nichts gefunden</h3><p>Keine Treffer für „'+esc(q)+'".</p></div>'; return; }
  el.innerHTML = list.map(c=>{
    const n=(c.stamps||[]).length, full=n>=5;
    const dots = Array.from({length:5},(_,i)=>'<i class="'+(i<n?'f':'')+'">'+(i<n?'🐾':'')+'</i>').join('');
    const btn = full
      ? '<button class="qstamp done" onclick="openCustomer(\''+c.id+'\')">voll<small>erneuern</small></button>'
      : '<button class="qstamp" onclick="quickStamp(event,\''+c.id+'\')" aria-label="Stempel geben">🐾</button>';
    return '<div class="crow">'+
      '<div class="cmain" onclick="openCustomer(\''+c.id+'\')">'+
        '<div class="av">'+esc(initials(c.name))+'</div>'+
        '<div class="cinfo"><div class="nm">'+esc(c.name)+'</div>'+
          '<div class="dg">'+(c.dog?'🐕 '+esc(c.dog):'&nbsp;')+'</div>'+
          '<div class="mini">'+dots+'</div></div>'+
      '</div>'+ btn +
    '</div>';
  }).join('');
}

/* ================= Schnell-Stempel aus der Liste ================= */
function quickStamp(ev, id){
  ev.stopPropagation();
  const c=cust(id); if(!c||(c.stamps||[]).length>=5) return;
  c.stamps.push(todayISO()); save(); renderList();
  if(navigator.vibrate) navigator.vibrate(c.stamps.length>=5?[20,40,20]:15);
  if(c.stamps.length>=5){ confetti(1300); toast(c.name.split(' ')[0]+': Karte voll! 🎉'); }
  else toast('Stempel '+c.stamps.length+'/5 · '+c.name.split(' ')[0]+' 🐾');
}

/* ================= Kunde anlegen / bearbeiten ================= */
function editCustomer(id){
  const c = id?cust(id):null;
  pop(
    '<h2>'+(c?'Kunde bearbeiten':'Neuer Kunde')+'</h2>'+
    '<div class="lbl">Haltername *</div><input class="field" id="f-name" placeholder="z. B. Maria Huber" value="'+esc(c?c.name:'')+'">'+
    '<div class="lbl">Hundename</div><input class="field" id="f-dog" placeholder="z. B. Balu" value="'+esc(c?c.dog:'')+'">'+
    '<button class="btn" onclick="saveCustomer('+(c?'\''+c.id+'\'':'null')+')">'+(c?'Speichern':'Kunde anlegen')+'</button>'+
    (c?'<button class="btn danger" onclick="askDelete(\''+c.id+'\')">Kunde löschen</button>':'')+
    '<button class="btn ghost" onclick="closePop()">Abbrechen</button>'
  );
  setTimeout(()=>$('#f-name')&&$('#f-name').focus(),250);
}
function saveCustomer(id){
  const name=($('#f-name').value||'').trim();
  if(!name){ toast('Bitte einen Namen eingeben'); return; }
  const dog=($('#f-dog').value||'').trim();
  if(id){ const c=cust(id); c.name=name; c.dog=dog; }
  else { S.customers.push({id:uid(),name,dog,stamps:[],done:[]}); }
  save(); closePop(); renderList(); toast(id?'Gespeichert ✓':'Kunde angelegt ✓');
}
function askDelete(id){
  const c=cust(id);
  pop('<div class="big-emoji">🗑️</div><h2 class="center">Kunde löschen?</h2><p class="p center">„'+esc(c.name)+'" und alle Stempel werden endgültig gelöscht.</p>'+
    '<button class="btn danger" onclick="doDelete(\''+id+'\')">Ja, löschen</button>'+
    '<button class="btn gray" onclick="editCustomer(\''+id+'\')">Abbrechen</button>');
}
function doDelete(id){ S.customers=S.customers.filter(c=>c.id!==id); save(); closePop(); renderList(); toast('Gelöscht'); }

/* ================= Kunden-Detail / Stempelkarte ================= */
let openId=null;
function openCustomer(id){ openId=id; renderCustomer(); }
function renderCustomer(animateSlot){
  const c=cust(openId); if(!c) return;
  const n=(c.stamps||[]).length, full=n>=5;
  const slots = Array.from({length:5},(_,i)=>{
    const on=i<n, isNext=(i===n)&&!full;
    return '<div class="slot'+(on?' on':'')+(isNext?' next':'')+(animateSlot===i?' pop':'')+'"'+(isNext?' onclick="doStamp()"':'')+'>'+
      (on?'<span class="paw">🐾</span><span class="dt">'+esc(fmtShort(c.stamps[i]))+'</span>':'<span class="num">'+(i+1)+'</span>')+'</div>';
  }).join('');

  const histStamps = (c.stamps||[]).map((d,i)=>'<div class="hi"><span class="g">🐾</span> Stempel '+(i+1)+'<span class="d">'+esc(fmtDate(d))+'</span></div>').join('');
  const histDone = (c.done||[]).slice().reverse().map(r=>'<div class="hi"><span class="g">✅</span> Karte abgeschlossen<span class="d">'+esc(fmtDate(r.date))+'</span></div>').join('');

  pop(
    '<div class="cust-head">'+
      '<div class="av">'+esc(initials(c.name))+'</div>'+
      '<div><div class="nm">'+esc(c.name)+'</div>'+(c.dog?'<div class="dg">🐕 '+esc(c.dog)+'</div>':'')+'</div>'+
      '<button class="ed" onclick="editCustomer(\''+c.id+'\')">✏️</button>'+
    '</div>'+

    '<div class="stampcard'+(animateSlot===4?' full':'')+'">'+
      '<div class="sc-top"><div><div class="sc-ttl">SOZIAL WALK</div><div class="sc-sub">Stempelkarte · 5 vergünstigte Einheiten</div></div><div class="sc-cnt">'+n+' / 5</div></div>'+
      '<div class="slots">'+slots+'</div>'+
      '<div class="sc-foot"><div class="sc-name"><small>Karte für</small>'+esc(c.name)+'</div>🐾</div>'+
    '</div>'+

    (full
      ? '<div class="fullnote">✅ Alle 5 Sozial Walks genutzt. Bitte die Karte erneuern oder auf Einzelbuchung umsteigen.</div>'+
        '<button class="btn amber" onclick="renewCard()">Neue Karte starten</button>'+
        '<button class="btn ghost" onclick="undoStamp()">Letzten Stempel zurücknehmen</button>'
      : '<button class="btn" onclick="doStamp()">🐾 Stempel geben ('+n+'/5)</button>'+
        (n>0?'<button class="btn ghost" onclick="undoStamp()">Letzten Stempel zurücknehmen</button>':'')
    )+

    ((histStamps||histDone)?'<div class="lbl">Verlauf</div><div class="hist">'+histDone+histStamps+'</div>':'')+
    ((c.done||[]).length?'<div style="font-size:13px;color:var(--gray);text-align:center;margin-top:16px">Abgeschlossene Karten gesamt: <b>'+c.done.length+'</b></div>':'')+
    '<button class="btn ghost" onclick="closePop()">Schließen</button>'
  );
}
function doStamp(){
  const c=cust(openId); if(!c||(c.stamps||[]).length>=5) return;
  c.stamps.push(todayISO()); save();
  const idx=c.stamps.length-1;
  renderCustomer(idx); renderList();
  if(navigator.vibrate) navigator.vibrate(idx===4?[20,40,20]:15);
  if(c.stamps.length>=5){ setTimeout(()=>{ confetti(1400); toast('Karte voll! 🎉'); },360); }
}
function undoStamp(){ const c=cust(openId); if(!c||!(c.stamps||[]).length) return; c.stamps.pop(); save(); renderCustomer(); renderList(); }
function renewCard(){
  const c=cust(openId); if(!c||(c.stamps||[]).length<5) return;
  c.done=c.done||[]; c.done.push({date:todayISO(), stamps:c.stamps.slice()});
  c.stamps=[]; save();
  if(navigator.vibrate) navigator.vibrate(20);
  pop('<div class="big-emoji">🆕</div><h2 class="center">Neue Karte gestartet</h2><p class="p center">Für <b>'+esc(c.name)+'</b> ist eine frische, leere Stempelkarte bereit. Die volle Karte wurde im Verlauf gespeichert.</p>'+
    '<button class="btn" onclick="renderCustomer()">Weiter</button><button class="btn ghost" onclick="closePop()">Schließen</button>', {dismiss:false});
  renderList();
}

/* ================= Einstellungen ================= */
function openSettings(){
  pop(
    '<h2>Einstellungen</h2>'+
    '<div class="rows">'+
      '<div class="row"><span class="ri">📦</span><span class="rt">Version</span><span class="rv">'+APP_VERSION+'</span></div>'+
      '<div class="row tap" onclick="showChanges()"><span class="ri">✨</span><span class="rt">Was ist neu</span><span class="chev">›</span></div>'+
      '<div class="row tap" onclick="showHistory()"><span class="ri">🕘</span><span class="rt">Versionsverlauf</span><span class="chev">›</span></div>'+
      '<div class="row tap" onclick="checkUpdate()"><span class="ri">🔄</span><span class="rt">Nach Updates suchen</span><span class="chev">›</span></div>'+
    '</div>'+
    '<div class="lbl">Mehr</div><div class="rows">'+
      '<div class="row tap danger" onclick="askReset()"><span class="ri">⚠️</span><span class="rt">Alles zurücksetzen</span></div>'+
    '</div>'+
    '<button class="btn ghost" onclick="closePop()">Schließen</button>'
  );
}
function showChanges(){ pop('<div class="big-emoji">✨</div><h2 class="center">Das ist neu in '+APP_VERSION+'</h2><ul class="chlist">'+CHANGES.map(c=>'<li>'+esc(c)+'</li>').join('')+'</ul><button class="btn" onclick="openSettings()">Alles klar</button>'); }
function showHistory(){ pop('<h2>Versionsverlauf</h2><p class="p">Alle Änderungen der App im Überblick.</p>'+VERSIONS.map((ver,i)=>'<div class="vitem"><div class="vh"><span class="vv">'+esc(ver.v)+'</span><span class="vd">'+esc(ver.date)+'</span>'+(i===0?'<span class="tagnew">aktuell</span>':'')+'</div><ul>'+ver.notes.map(n=>'<li>'+esc(n)+'</li>').join('')+'</ul></div>').join('')+'<button class="btn ghost" onclick="openSettings()">Zurück</button>'); }
function askReset(){ pop('<div class="big-emoji">⚠️</div><h2 class="center">Alles zurücksetzen?</h2><p class="p center">Alle Kunden und Stempel werden endgültig gelöscht. Das kann nicht rückgängig gemacht werden.</p><button class="btn danger" onclick="doReset()">Ja, alles löschen</button><button class="btn gray" onclick="openSettings()">Abbrechen</button>'); }
function doReset(){ try{ localStorage.removeItem(DB); }catch(e){} location.reload(); }

/* ================= Dashboard ================= */
function allStampDates(){ const out=[]; S.customers.forEach(c=>{ (c.stamps||[]).forEach(d=>out.push(d)); (c.done||[]).forEach(r=>(r.stamps||[]).forEach(d=>out.push(d))); }); return out; }
function lastDate(c){ const ds=[]; (c.stamps||[]).forEach(d=>ds.push(d)); (c.done||[]).forEach(r=>(r.stamps||[]).forEach(d=>ds.push(d))); ds.sort(); return ds[ds.length-1]||''; }
function daysSince(iso){ const a=new Date(iso+'T00:00:00'), b=new Date(todayISO()+'T00:00:00'); return Math.floor((b-a)/864e5); }
function monthsBack(k){ const arr=[], d=new Date(todayISO()+'T00:00:00'); d.setDate(1); for(let i=k-1;i>=0;i--){ const m=new Date(d.getFullYear(),d.getMonth()-i,1); arr.push({ ym:m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0'), label:m.toLocaleDateString('de-DE',{month:'short'}).replace('.','') }); } return arr; }

function openDashboard(){
  const stamps=allStampDates(), total=stamps.length, ym=todayISO().slice(0,7);
  const monat=stamps.filter(d=>d.slice(0,7)===ym).length;
  const archivN=S.customers.reduce((a,c)=>a+((c.done||[]).length),0);
  const aktive=S.customers.filter(c=>{const n=(c.stamps||[]).length; return n>0&&n<5;}).length;
  const months=monthsBack(6), counts=months.map(m=>stamps.filter(d=>d.slice(0,7)===m.ym).length), max=Math.max(1,...counts);
  const bars=months.map((m,i)=>{ const h=counts[i]?Math.max(Math.round(counts[i]/max*100),7):0; return '<div class="bar"><div class="bk" style="height:'+h+'%">'+(counts[i]?'<span class="bv">'+counts[i]+'</span>':'')+'</div><div class="bl">'+esc(m.label)+'</div></div>'; }).join('');
  const inact=S.customers.map(c=>({c,last:lastDate(c)})).filter(x=>!x.last||daysSince(x.last)>42).sort((a,b)=>(a.last||'0').localeCompare(b.last||'0'));
  const inactHtml=inact.length? inact.slice(0,6).map(x=>'<div class="hi"><span class="g">🐕</span> '+esc(x.c.name)+(x.c.dog?' · '+esc(x.c.dog):'')+'<span class="d">'+(x.last?'vor '+Math.max(1,Math.floor(daysSince(x.last)/7))+' Wo.':'noch nie')+'</span></div>').join('') : '<div class="warn">Alle waren kürzlich da 👍</div>';
  pop(
    '<h2>Übersicht</h2>'+
    '<div class="dash-stats">'+
      '<div class="dcard"><div class="n">'+S.customers.length+'</div><div class="l">Kund:innen</div></div>'+
      '<div class="dcard"><div class="n">'+aktive+'</div><div class="l">Aktive Karten</div></div>'+
      '<div class="dcard"><div class="n">'+monat+'</div><div class="l">Walks diesen Monat</div></div>'+
      '<div class="dcard"><div class="n">'+total+'</div><div class="l">Walks gesamt</div></div>'+
    '</div>'+
    '<div class="lbl">Sozial Walks pro Monat</div><div class="dcard"><div class="bars">'+bars+'</div></div>'+
    '<div class="lbl">Länger nicht da (über 6 Wochen)</div><div class="dcard"><div class="hist">'+inactHtml+'</div></div>'+
    '<div class="lbl">Archiv</div><div class="rows"><div class="row tap" onclick="openArchive()"><span class="ri">🗂️</span><span class="rt">Volle Karten im Archiv</span><span class="rv">'+archivN+'</span><span class="chev">›</span></div></div>'+
    '<button class="btn ghost" onclick="closePop()">Schließen</button>'
  );
}

/* ================= Archiv (volle Karten) ================= */
function openArchive(){
  const items=[];
  S.customers.forEach(c=>(c.done||[]).forEach((r,idx)=>items.push({c,r,idx})));
  items.sort((a,b)=>(b.r.date||'').localeCompare(a.r.date||''));
  const body=items.length? items.map(it=>
    '<div class="arch"><div class="ah"><span class="nm">'+esc(it.c.name)+'</span>'+(it.c.dog?'<span style="color:var(--gray);font-size:13px">· '+esc(it.c.dog)+'</span>':'')+'<span class="d">'+esc(fmtDate(it.r.date))+'</span></div>'+
      '<div class="pawline">🐾🐾🐾🐾🐾</div>'+
      '<div class="actions"><button class="abtn-re" onclick="reactivateCard(\''+it.c.id+'\','+it.idx+')">↩︎ Reaktivieren</button><button class="abtn-del" onclick="askDeleteArchived(\''+it.c.id+'\','+it.idx+')">🗑 Löschen</button></div></div>'
  ).join('') : '<div class="warn">Noch keine vollen Karten im Archiv.</div>';
  pop('<h2>Archiv</h2><p class="p">Abgeschlossene Karten. Du kannst einzelne reaktivieren oder löschen, um aufzuräumen.</p>'+body+'<button class="btn ghost" onclick="openDashboard()">Zurück</button>');
}
function reactivateCard(id, idx){
  const c=cust(id); if(!c||!c.done||!c.done[idx]) return;
  if((c.stamps||[]).length>0){
    pop('<div class="big-emoji">↩︎</div><h2 class="center">Karte ersetzen?</h2><p class="p center"><b>'+esc(c.name)+'</b> hat aktuell eine Karte mit '+c.stamps.length+'/5 Stempeln. Beim Reaktivieren wird diese durch die archivierte (volle) Karte ersetzt.</p>'+
      '<button class="btn" onclick="doReactivate(\''+id+'\','+idx+')">Ja, ersetzen</button><button class="btn gray" onclick="openArchive()">Abbrechen</button>'); return;
  }
  doReactivate(id, idx);
}
function doReactivate(id, idx){
  const c=cust(id); if(!c||!c.done||!c.done[idx]) return;
  c.stamps=(c.done[idx].stamps||[]).slice(); c.done.splice(idx,1); save();
  renderList(); openArchive(); toast('Karte reaktiviert ↩︎');
}
function askDeleteArchived(id, idx){
  const c=cust(id); if(!c||!c.done||!c.done[idx]) return;
  pop('<div class="big-emoji">🗑️</div><h2 class="center">Karte löschen?</h2><p class="p center">Diese abgeschlossene Karte von <b>'+esc(c.name)+'</b> wird endgültig aus dem Archiv gelöscht.</p>'+
    '<button class="btn danger" onclick="doDeleteArchived(\''+id+'\','+idx+')">Ja, löschen</button><button class="btn gray" onclick="openArchive()">Abbrechen</button>');
}
function doDeleteArchived(id, idx){ const c=cust(id); if(!c||!c.done) return; c.done.splice(idx,1); save(); renderList(); openArchive(); toast('Aus Archiv gelöscht'); }

/* ================= Popups & Toast ================= */
let ovlDismiss=true;
function pop(html,opts){ ovlDismiss=!opts||opts.dismiss!==false; const o=$('#ovl'); o.innerHTML='<div class="sheet"><div class="grab"></div>'+html+'</div>'; o.classList.add('show'); attachDrag(o.querySelector('.sheet')); }
function closePop(){ const o=$('#ovl'); o.classList.remove('show'); setTimeout(()=>{ if(!o.classList.contains('show')) o.innerHTML=''; },240); }
$('#ovl').addEventListener('click',e=>{ if(e.target.id==='ovl'&&ovlDismiss) closePop(); });

/* Wisch nach unten schließt das Sheet (nur wenn oben gescrollt & dismissbar) */
function attachDrag(sheet){
  if(!sheet) return;
  let startY=0, dy=0, dragging=false;
  sheet.addEventListener('touchstart', e=>{ if(sheet.scrollTop>0){ dragging=false; return; } startY=e.touches[0].clientY; dy=0; dragging=true; sheet.style.transition='none'; }, {passive:true});
  sheet.addEventListener('touchmove', e=>{ if(!dragging) return; dy=e.touches[0].clientY-startY; if(dy>0) sheet.style.transform='translateY('+dy+'px)'; }, {passive:true});
  sheet.addEventListener('touchend', ()=>{ if(!dragging) return; dragging=false; sheet.style.transition='';
    if(dy>110 && ovlDismiss){ sheet.style.transform='translateY(100%)'; closePop(); }
    else sheet.style.transform=''; });
}
let toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2100); }

/* ================= Konfetti ================= */
function confetti(dur){
  const cv=$('#cfx'), ctx=cv.getContext('2d'); const dpr=Math.min(devicePixelRatio||1,2);
  cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  const cols=['#7C3447','#98455B','#E0913E','#E2705A','#F0C24A','#ffffff'];
  const N=110, parts=[];
  for(let i=0;i<N;i++) parts.push({x:innerWidth/2+(Math.random()-.5)*120, y:innerHeight*0.42, vx:(Math.random()-.5)*9, vy:Math.random()*-11-4, g:.32+Math.random()*.18, s:6+Math.random()*7, r:Math.random()*6.28, vr:(Math.random()-.5)*.3, c:cols[i%cols.length]});
  const t0=performance.now();
  (function frame(t){ const el=t-t0; ctx.clearRect(0,0,innerWidth,innerHeight);
    parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,1-el/dur); ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
    if(el<dur) requestAnimationFrame(frame); else ctx.clearRect(0,0,innerWidth,innerHeight);
  })(t0);
}

/* ================= Service Worker & Update ================= */
let swReg=null;
function promptUpdate(worker){
  pop('<div class="big-emoji">🚀</div><h2 class="center">Neue Version verfügbar</h2><p class="p center">Eine Aktualisierung von Sozial Walk ist bereit. Jetzt laden?</p><button class="btn amber" id="updBtn">Jetzt aktualisieren</button><button class="btn ghost" onclick="closePop()">Später</button>');
  $('#updBtn').onclick=()=>{ S.pup=true; save(); worker.postMessage({type:'SKIP_WAITING'}); };
}
function checkUpdate(){ if(!swReg){ toast('Offline – Update nicht möglich'); return; } toast('Suche nach Updates …'); swReg.update().catch(()=>{}); setTimeout(()=>{ if(!swReg.waiting&&!swReg.installing) toast('Du bist auf dem neuesten Stand ✓'); },2500); }
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1')){
  navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).then(reg=>{
    swReg=reg;
    if(reg.waiting&&navigator.serviceWorker.controller) promptUpdate(reg.waiting);
    reg.addEventListener('updatefound',()=>{ const nw=reg.installing; nw&&nw.addEventListener('statechange',()=>{ if(nw.state==='installed'&&navigator.serviceWorker.controller) promptUpdate(nw); }); });
  }).catch(()=>{});
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(refreshing)return; refreshing=true; location.reload(); });
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&swReg) swReg.update().catch(()=>{}); });
}

/* ================= Boot ================= */
function boot(){
  renderList();
  if(S.pup){
    S.pup=false; save();
    setTimeout(()=>confetti(1600),300);
    pop('<div class="big-emoji">🎉</div><h2 class="center">Update installiert!</h2><p class="p center">Du nutzt jetzt Version '+APP_VERSION+'.</p><div class="lbl" style="text-align:center">Das ist neu</div><ul class="chlist">'+CHANGES.map(c=>'<li>'+esc(c)+'</li>').join('')+'</ul><button class="btn" onclick="closePop()">Los geht\'s</button>',{dismiss:false});
  }
}
boot();
</script>
